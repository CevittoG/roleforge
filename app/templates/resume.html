<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="pdf.css"></head>
<body>
  <h1>{{ resume.headline }}</h1>
  <p class="summary">{{ resume.summary }}</p>
  {% for s in resume.sections %}
  <div class="section">
    <h2>{{ s.title }}</h2>
    <ul>{% for item in s.items %}<li>{{ item }}</li>{% endfor %}</ul>
  </div>
  {% endfor %}
</body>
</html>
